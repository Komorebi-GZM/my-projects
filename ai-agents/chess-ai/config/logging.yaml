# ============================================
# 中国象棋AI对弈工具 - 日志配置文件
# ============================================
# 使用 Python logging.config.dictConfig 格式
# 文档: https://docs.python.org/3/library/logging.config.html

version: 1
disable_existing_loggers: false

# ==================== 日志格式 ====================
formatters:
  # 标准格式（用于文件）
  standard:
    format: "%(asctime)s [%(levelname)s] [%(name)s] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  # 详细格式（用于调试）
  detailed:
    format: "%(asctime)s [%(levelname)s] [%(name)s:%(lineno)d] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  # 简洁格式（用于控制台）
  simple:
    format: "[%(levelname)s] %(message)s"
  
  # 彩色格式（用于控制台，需要 colorlog）
  colored:
    (): colorlog.ColoredFormatter
    format: "%(log_color)s%(asctime)s [%(levelname)s] %(message)s%(reset)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
    log_colors:
      DEBUG: cyan
      INFO: green
      WARNING: yellow
      ERROR: red
      CRITICAL: red,bg_white

# ==================== 日志处理器 ====================
handlers:
  # 控制台输出
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout
  
  # 彩色控制台输出（开发环境）
  console_colored:
    class: logging.StreamHandler
    level: DEBUG
    formatter: colored
    stream: ext://sys.stdout
  
  # 主日志文件
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: ./logs/chess_ai.log
    maxBytes: 10485760  # 10 MB
    backupCount: 5
    encoding: utf-8
  
  # 错误日志文件（单独记录错误）
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: ./logs/chess_ai_error.log
    maxBytes: 10485760  # 10 MB
    backupCount: 5
    encoding: utf-8
  
  # 调试日志文件（开发环境）
  debug_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: ./logs/chess_ai_debug.log
    maxBytes: 52428800  # 50 MB
    backupCount: 3
    encoding: utf-8

# ==================== 日志记录器 ====================
loggers:
  # 棋盘引擎模块
  chess.board:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  # GUI 模块
  chess.gui:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  # Agent 模块
  chess.agent:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  # LLM 模块
  chess.llm:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  # LangGraph 内部日志
  langgraph:
    level: WARNING
    handlers: [console, file]
    propagate: false
  
  # LangChain 内部日志
  langchain:
    level: WARNING
    handlers: [console, file]
    propagate: false

# ==================== 根日志记录器 ====================
root:
  level: INFO
  handlers: [console, file, error_file]

# ==================== 环境特定配置 ====================
# 开发环境：启用彩色输出和调试日志
# 生产环境：使用标准格式，关闭调试日志

# 可以通过环境变量覆盖配置：
# LOG_LEVEL=DEBUG
# LOG_FORMAT=colored
